name: Fetch Sheets Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar dados do Google Sheets
        run: |
          curl -L "${{ secrets.SHEETS_URL }}" -o data.csv

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.csv
          git diff --cached --quiet || git commit -m "Atualiza dados"
          git push
